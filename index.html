
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#081321;
overflow:hidden;
color:white;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("photo.jpg") center center/cover no-repeat;
filter:brightness(.45);
animation:zoom 20s infinite alternate ease-in-out;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

#overlay{
position:fixed;
inset:0;
background:linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.55));
}

#intro,
#card{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

#card{
display:none;
overflow:auto;
}

.box{
max-width:850px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(8px);
padding:35px;
border-radius:24px;
box-shadow:0 0 30px rgba(255,215,0,.25);
}

h1{
font-size:48px;
margin-bottom:10px;
}

h2{
font-weight:400;
margin-bottom:30px;
}

button{
padding:15px 36px;
font-size:18px;
border:none;
border-radius:40px;
cursor:pointer;
background:#D4AF37;
color:#111;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.title{
font-size:42px;
margin-bottom:10px;
color:#FFD86B;
}

.sub{
font-size:22px;
margin-bottom:25px;
}

.line{
opacity:0;
transform:translateY(20px);
margin:18px 0;
font-size:20px;
line-height:1.8;
}

.show{
animation:fade .9s forwards;
}

@keyframes fade{
to{
opacity:1;
transform:translateY(0);
}
}

.end{
margin-top:40px;
font-size:28px;
color:#FFD86B;
opacity:0;
}

.star{
position:fixed;
color:#FFD86B;
opacity:.7;
pointer-events:none;
animation:fly linear infinite;
}

@keyframes fly{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>

<div id="intro">

<div class="box">

<h1>🎉</h1>

<h2>Happy Birthday<br>生日快樂</h2>

<p style="margin-bottom:30px;font-size:20px;">
有一份生日祝福等著您
</p>

<button onclick="openCard()">
🎁 打開生日卡片
</button>

</div>

</div>

<div id="card">

<div class="box">

<div class="title">
🎂 Happy Birthday
</div>

<div class="sub">
生日快樂
</div>

<div class="line">
親愛的老闆：
</div>

<div class="line">
祝您生日快樂！
</div>

<div class="line">
願您身體健康，天天開心，
萬事如意，事業蒸蒸日上！
</div>

<div class="line">
謝謝您一直以來的照顧、
信任與帶領。
</div>

<div class="line">
祝您新的一歲，
充滿幸福、成功與美好的回憶。
</div>

<div class="line">
🎉 Chúc mừng sinh nhật Sếp!
</div>

<div class="line">
Kính chúc Sếp luôn mạnh khỏe,
nhiều niềm vui và thật nhiều thành công.
</div>
<script>
function openCard(){

document.getElementById("intro").style.display="none";
document.getElementById("card").style.display="flex";

// play music
const music = new Audio("music.mp3");
music.loop = true;
music.play().catch(()=>{});

// show lines
const lines = document.querySelectorAll(".line");

lines.forEach((el,i)=>{
setTimeout(()=>{
el.classList.add("show");
}, i * 2000);
});

// stars effect
for(let i=0;i<25;i++){
let s=document.createElement("div");
s.className="star";
s.innerHTML="✨";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.fontSize=(10+Math.random()*18)+"px";
s.style.animationDuration=(6+Math.random()*10)+"s";
document.body.appendChild(s);
}

}
</script>

</body>
</html>
